name: Market Intelligence (Step 2)

on:
  schedule:
  - cron: '45 10 * * 1-5'  # UTC 10:45 = JST 19:45に実行  
  workflow_dispatch:

# --- 追記: 同時実行の制御 (GPT提案) ---
concurrency:
  group: stock-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Core Logic and Generate HTML
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # ==========================================
      # 🚨 【追記】計算結果（履歴JSON）をmainブランチに保存して「記憶喪失」を防ぐ
      # ==========================================
      - name: Commit and Push Data to Main Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/
          if ! git diff --staged --quiet; then
            git commit -m "📊 [Daily Update] 市場データと履歴の更新"
            git push origin main --force-with-lease
          else
            echo "変更がないため、プッシュをスキップしました。"
          fi

      # 生成された public フォルダの中身（HTMLとJSON）を自動公開する
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
